<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RS Live TV</title>

    <!-- ব্রাউজার ক্যাশ সিকিউরিটি (যাতে পুরোনো ডেটা আটকে না থাকে) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- ফ্রন্টএন্ড এবং বুটস্ট্র্যাপ সিএসএস লিংক -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* বেসিক সিকিউরিটি ও ইউজার এক্সপেরিয়েন্স স্টাইল */
        body {
            background-color: #000;
            color: #fff;
            -webkit-user-select: none; /* টেক্সট কপি বা সিলেক্ট বন্ধ করার জন্য */
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .search-box-container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-box-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 2px solid #2d2e35;
            background: #111216;
            color: #fff;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .search-box-container input:focus {
            border-color: #3b82f6;
        }
        .iframe-container {
            background: #000;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #1f2937;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        /* নোটিশ বার স্টাইল */
        .notice-bar {
            background: #111;
            border: 1px solid #222;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- মূল অ্যাপ্লিকেশন কন্টেইনার -->
    <div class="container-fluid">
        
        <!-- সার্চ এবং নোটিশ এরিয়া -->
        <div class="row">
            <div class="col-xs-12">
                <div class="search-box-container">
                    <input type="text" id="channelSearch" placeholder="🔍 চ্যানেল বা লাইভ ম্যাচ খুঁজুন..." autocomplete="off">
                </div>
            </div>
        </div>

        <!-- টিভি এবং প্লেয়ার এরিয়া -->
        <div class="tv-area">
            <div class="row">
                
                <!-- ভিডিও প্লেয়ার সেকশন (col-md-9) -->
                <div class="col-md-9 col-sm-12 col-xs-12">
                    <div class="iframe-container">
                        <!-- 
                          Security Features inside iframe sandbox:
                          - allow-scripts: চ্যানেল ডাইনামিক লোড হওয়ার জন্য স্ক্রিপ্ট পারমিশন।
                          - allow-same-origin: স্থানীয় ফাইল (channel.html) সঠিকভাবে রিড করার জন্য।
                          - allow-forms: প্লেয়ারের প্রয়োজনীয় ইন্টারনাল ফর্ম সাবমিশন সাপোর্ট।
                        -->
                        <iframe 
                            id="tv-iframe" 
                            src="" 
                            allowfullscreen="true" 
                            webkitallowfullscreen="true" 
                            mozallowfullscreen="true" 
                            scrolling="no"
                            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                            referrerpolicy="no-referrer">
                        </iframe>
                    </div>
                </div>

                <!-- সাইডবার চ্যানেল লিস্ট সেকশন (col-md-3) -->
                <div class="col-md-3 col-sm-12 col-xs-12">
                    <div class="channel-list">
                        <!-- জাভাস্ক্রিপ্ট (script.js) ডাইনামিক্যালি এই উল-লিস্টের ভেতরে ক্লিক-ফিক্সড চ্যানেলগুলো লোড করবে -->
                        <ul id="channel-container" class="thumbnail-slider"></ul>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- মেইন অ্যাপ্লিকেশন লজিক ও ইন্টারঅ্যাকশন স্ক্রিপ্ট -->
    <script src="script.js"></script>

    <!-- সিকিউরিটি কোড: ডেভলপার টুলস (F12, Right Click) ব্লক করার জন্য (ঐচ্ছিক কিন্তু সুরক্ষার জন্য কার্যকর) -->
    <script>
        // রাইট ক্লিক বন্ধ করার জন্য
        document.addEventListener('contextmenu', event => event.preventDefault());

        // কিবোর্ড শর্টকাট (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U) ব্লক করার জন্য
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123) { // F12
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) { // Ctrl+Shift+I / J
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.keyCode == 85) { // Ctrl+U (View Source)
                e.preventDefault();
                return false;
            }
        });

        // ক্লিক জ্যাকিং (Clickjacking) সুরক্ষা: আপনার সাইট যাতে অন্য কেউ আইফ্রেমে লুকিয়ে ব্যবহার করতে না পারে
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }
    </script>
</body>
</html>

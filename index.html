<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DRBZH98TKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DRBZH98TKH');
    </script>

    <title>RS Live TV</title>

    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css?v=10.0" rel="stylesheet">

    <style>
        /* লোডার ও অন্যান্য স্টাইল আগের মতোই থাকবে */
        #intro-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #040406; display: flex; align-items: center; justify-content: center; z-index: 9999999; transition: opacity 0.5s ease; }
        .brand-text { font-size: 32px; font-weight: 900; color: #fff; }
        .brand-text span { color: #00f0ff; }
        .tv-view .embed-responsive { border-radius: 8px; overflow: hidden; }
        iframe { border: 0 !important; width: 100%; height: 100%; }
        .marquee-container { background: #121212; color: #ffffff; padding: 8px 0; border-top: 1px solid #333; }
        .notice-label { background: #ff4444; color: #fff; padding: 2px 10px; margin-left: 10px; border-radius: 4px; font-size: 11px; }
    </style>
</head>

<body>

    <div id="intro-loader">
        <h1 class="brand-text">RS Live <span>TV</span></h1>
    </div>

    <div class="container tv-area">
        <div class="row">
            <div class="col-xs-12 col-md-10 tv-view">
                <div class="embed-responsive embed-responsive-16by9">
                    <iframe name="player" class="embed-responsive-item" allowfullscreen src="channel.html"></iframe>
                </div>
            </div>
            <div class="col-xs-12 col-md-2 channel-list" id="scroll-wrapper">
                <ul class="thumbnail-slider" id="channel-container"></ul>
            </div>
        </div>
    </div>

    <div class="marquee-container">
        <div class="notice-label">NOTICE</div>
        <marquee scrollamount="6">টিভি চ্যানেল প্লে হতে ৫ থেকে ১০ সেকেন্ড টাইম নিতে পারে। ফুল স্ক্রিন মোডে ভিডিও দেখুন।</marquee>
    </div>

    <script src="script.js?v=10.0"></script>
    <script>
        // ১. লোডার রিমুভার
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loader = document.getElementById('intro-loader');
                if (loader) { loader.style.opacity = '0'; setTimeout(() => { loader.remove(); }, 500); }
            }, 1200); 
        });

        // ২. রিমোট ও কিবোর্ড কন্ট্রোল (স্পেস বাটন লক করা)
        document.addEventListener('keydown', function(event) {
            const items = Array.from(document.querySelectorAll('#channel-container li'));
            if (items.length === 0) return;
            
            const active = document.activeElement;
            let index = items.indexOf(active);

            // স্পেস বাটন লক
            if (event.keyCode === 32 || event.key === " ") {
                event.preventDefault();
                return;
            }

            // আপ/ডাউন ও এন্টার কন্ট্রোল
            if (event.keyCode === 40 || event.key === "ArrowDown") {
                event.preventDefault();
                if (index + 1 < items.length) items[index + 1].focus();
            } else if (event.keyCode === 38 || event.key === "ArrowUp") {
                event.preventDefault();
                if (index - 1 >= 0) items[index - 1].focus();
            } else if (event.keyCode === 13 || event.key === "Enter") {
                if (active && active.tagName === 'LI') { active.click(); }
            }
        });

        // স্ক্রোল ভিউ ফিক্সড
        window.addEventListener('focus', function(event) {
            if (event.target && event.target.tagName === 'LI') {
                event.target.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }, true); 

        function initTVFocus() {
            setTimeout(() => {
                const firstChannel = document.querySelector('#channel-container li');
                if (firstChannel) firstChannel.focus();
            }, 600);
        }
    </script>
</body>
</html>

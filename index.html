        // ============================================================
        //  ডিকোড ও রেন্ডার
        // ============================================================
        function decodeAndRender() {
            try {
                const decoded = atob(encodedData);
                document.write(decoded);
                document.close();
            } catch (e) {
                document.getElementById('loader').innerHTML = `
                    <div style="color:#ff4444; text-align:center; padding:20px;">
                        <h2>⚠️ ডিকোড করতে সমস্যা হয়েছে</h2>
                        <p style="font-size:14px; color:#aaa;">${e.message}</p>
                        <button onclick="location.reload()" style="margin-top:15px; background:#00f0ff; color:#000; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">রিফ্রেশ করুন</button>
                    </div>
                `;
            }
        }

        // ৫০০ms পর রেন্ডার করুন (লোডার দেখানোর জন্য)
        setTimeout(decodeAndRender, 500);
    </script>

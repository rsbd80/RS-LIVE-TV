<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RS Live TV</title>

<link rel="shortcut icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">

<link href="bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* =========================
   BODY
========================= */

body{
    background:#000;
    margin:0;
    padding:0;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

.row{
    margin-left:0 !important;
    margin-right:0 !important;
}

.tv-area{
    margin-top:15px;
}

/* =========================
   PLAYER SIDE
========================= */

.tv-view{
    padding-right:8px !important;
    overflow:hidden;
}

.channel-list{
    padding-left:8px !important;
    overflow-y:auto;
    overflow-x:visible;
}

.embed-responsive{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    background:#000;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #222;
}

.embed-responsive iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
}

/* =========================
   CHANNEL LIST
========================= */

#channel-container{
    list-style:none;
    margin:0;
    padding:0;
}

#channel-container li{
    position:relative;
    margin-bottom:10px;
    border-radius:10px;
    overflow:hidden;
    transition:all .18s ease;
    box-sizing:border-box;
    border:2px solid transparent;
    background:#111;
    cursor:pointer;
}

#channel-container li:hover{
    border-color:#333;
}

/* =========================
   SELECTED CHANNEL
========================= */

.selected-tv-channel{
    border:2px solid #00eaff !important;

    box-shadow:
        0 0 12px rgba(0,234,255,.7),
        inset 0 0 6px rgba(0,234,255,.25) !important;

    background:rgba(0,234,255,.08) !important;

    transform:scale(.98) !important;

    z-index:2;
}

/* =========================
   ACTIVE PLAYING CHANNEL
========================= */

.active-tv-channel{
    border:2px solid #ff0055 !important;

    box-shadow:
        0 0 14px rgba(255,0,85,.7),
        inset 0 0 8px rgba(255,0,85,.3) !important;

    background:rgba(255,0,85,.10) !important;

    transform:scale(.98) !important;

    animation:glowPulse 1.5s infinite;

    z-index:3;
}

@keyframes glowPulse{

    0%{
        box-shadow:
            0 0 10px rgba(255,0,85,.5),
            inset 0 0 5px rgba(255,0,85,.2);
    }

    50%{
        box-shadow:
            0 0 18px rgba(255,0,140,.9),
            inset 0 0 10px rgba(255,0,140,.35);
    }

    100%{
        box-shadow:
            0 0 10px rgba(255,0,85,.5),
            inset 0 0 5px rgba(255,0,85,.2);
    }
}

/* =========================
   REMOTE BUTTON
========================= */

.remote-btn-container{
    margin-bottom:10px;
}

.remote-open-btn{
    width:100%;
    border:none;
    background:#111;
    color:#fff;
    padding:12px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.remote-open-btn:hover{
    background:#1a1a1a;
}

/* =========================
   REMOTE PANEL
========================= */

.remote-body-floating{
    display:none;

    position:fixed;
    bottom:25px;
    right:20px;

    width:105px;

    background:#0a0a0c;

    padding:15px 8px;

    border-radius:25px;

    border:1px solid #1f1f24;

    box-shadow:0 15px 40px rgba(0,0,0,.95);

    z-index:999999;
}

.remote-header{
    color:#666;
    text-align:center;
    font-size:9px;
    margin-bottom:10px;
}

.remote-row{
    display:flex;
    justify-content:center;
    margin-bottom:8px;
}

.r-btn{
    width:100%;
    height:38px;

    border:none;

    border-radius:10px;

    background:#16161a;

    color:#fff;

    cursor:pointer;
}

.r-btn-ok{
    width:48px;
    height:48px;
    border-radius:50%;
    background:#111;
    border:1px solid #333;
}

/* =========================
   OSD
========================= */

.tv-osd{
    display:none;

    position:fixed;
    top:40px;
    left:50%;

    transform:translateX(-50%);

    background:rgba(17,17,17,.95);

    color:#ff0055;

    border:1px solid #333;

    padding:8px 20px;

    border-radius:20px;

    font-weight:bold;

    z-index:1000000;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .tv-view{
        padding-right:0 !important;
    }

    .channel-list{
        padding-left:0 !important;
        margin-top:12px;
    }

    .selected-tv-channel,
    .active-tv-channel{
        transform:scale(.99) !important;
    }
}

</style>
</head>

<body>

<div id="tvOsd" class="tv-osd"></div>

<div class="container tv-area">

<div class="row">

<!-- PLAYER -->

<div class="col-xs-12 col-md-10 tv-view">

<div class="remote-btn-container">
<button onclick="toggleRemote(true)" class="remote-open-btn">
<i class="fa-solid fa-tv"></i>
OPEN TV REMOTE CONTROL PANEL
</button>
</div>

<div class="embed-responsive">
<iframe
name="player"
id="tvPlayer"
allowfullscreen
src="channel.html">
</iframe>
</div>

</div>

<!-- CHANNEL LIST -->

<div class="col-xs-12 col-md-2 channel-list">

<ul id="channel-container">

<li onclick="playChannel('channel1.html',this)">
<img src="https://dummyimage.com/300x80/222/fff&text=STAR+JALSHA" width="100%">
</li>

<li onclick="playChannel('channel2.html',this)">
<img src="https://dummyimage.com/300x80/333/fff&text=SONY+AATH" width="100%">
</li>

<li onclick="playChannel('channel3.html',this)">
<img src="https://dummyimage.com/300x80/444/fff&text=SPORTS+18" width="100%">
</li>

<li onclick="playChannel('channel4.html',this)">
<img src="https://dummyimage.com/300x80/555/fff&text=TSports" width="100%">
</li>

</ul>

</div>

</div>
</div>

<!-- REMOTE -->

<div class="remote-body-floating" id="remotePanel">

<div class="remote-header">
RS REMOTE
</div>

<div class="remote-row">
<button class="r-btn" onclick="moveSelection(-1)">
<i class="fa-solid fa-chevron-up"></i>
</button>
</div>

<div class="remote-row">
<button class="r-btn r-btn-ok" onclick="selectAndPlayChannel()">
OK
</button>
</div>

<div class="remote-row">
<button class="r-btn" onclick="moveSelection(1)">
<i class="fa-solid fa-chevron-down"></i>
</button>
</div>

</div>

<script>

let selectedChannelIndex = 0;
let activePlayingIndex = -1;

/* =========================
   REMOTE TOGGLE
========================= */

function toggleRemote(show){
    document.getElementById('remotePanel').style.display =
    show ? 'block' : 'none';

    updateSelectionHighlight();
}

/* =========================
   PLAY CHANNEL
========================= */

function playChannel(url,el){

    document.getElementById('tvPlayer').src = url;

    const channels =
    document.querySelectorAll('#channel-container li');

    channels.forEach(ch=>{
        ch.classList.remove('active-tv-channel');
        ch.classList.remove('selected-tv-channel');
    });

    el.classList.add('active-tv-channel');

    activePlayingIndex =
    [...channels].indexOf(el);

    selectedChannelIndex =
    activePlayingIndex;

    showOSD("📡 CHANNEL LOADING...");
}

/* =========================
   MOVE SELECTION
========================= */

function moveSelection(direction){

    const channels =
    document.querySelectorAll('#channel-container li');

    if(!channels.length) return;

    channels.forEach(ch=>{
        ch.classList.remove('selected-tv-channel');
    });

    selectedChannelIndex += direction;

    if(selectedChannelIndex >= channels.length)
        selectedChannelIndex = 0;

    if(selectedChannelIndex < 0)
        selectedChannelIndex = channels.length - 1;

    if(selectedChannelIndex !== activePlayingIndex){
        channels[selectedChannelIndex]
        .classList.add('selected-tv-channel');
    }

    channels[selectedChannelIndex]
    .scrollIntoView({
        behavior:'smooth',
        block:'nearest'
    });
}

/* =========================
   PLAY SELECTED
========================= */

function selectAndPlayChannel(){

    const channels =
    document.querySelectorAll('#channel-container li');

    if(!channels[selectedChannelIndex]) return;

    channels[selectedChannelIndex].click();
}

/* =========================
   UPDATE HIGHLIGHT
========================= */

function updateSelectionHighlight(){

    const channels =
    document.querySelectorAll('#channel-container li');

    channels.forEach((ch,idx)=>{

        ch.classList.remove('selected-tv-channel');

        if(idx === selectedChannelIndex &&
           idx !== activePlayingIndex){

            ch.classList.add('selected-tv-channel');
        }
    });
}

/* =========================
   OSD
========================= */

function showOSD(text){

    const osd =
    document.getElementById('tvOsd');

    osd.innerText = text;

    osd.style.display = 'block';

    clearTimeout(window.osdTimeout);

    window.osdTimeout =
    setTimeout(()=>{
        osd.style.display='none';
    },1200);
}

</script>

</body>
</html>

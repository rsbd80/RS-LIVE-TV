<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RS Live TV</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background: #000; overflow-x: hidden; margin: 0; padding: 0; font-family: Arial, sans-serif; counter-reset: channel-counter; }

        /* ডেস্কটপ ভিউয়ের জন্য লেআউট আপডেট */
        @media (min-width: 992px) {
            .container.tv-area { max-width: 1200px; }
            .tv-area .row { display: flex; flex-direction: row; gap: 20px; }
            .tv-view { flex: 0 0 70%; max-width: 70%; }
            .channel-list { 
                flex: 0 0 28%; max-width: 28%; height: 500px; overflow-y: auto; 
                background: #0a0a0a; border-radius: 8px; padding: 10px !important; border: 1px solid #222; 
            }
            .channel-list ul#channel-container { display: flex !important; flex-direction: column !important; padding: 0 !important; gap: 8px !important; }
            .channel-list ul#channel-container li { width: 100% !important; height: 60px !important; flex: 0 0 auto !important; border: 1px solid #333 !important; }
        }

        /* আগের অন্যান্য স্টাইলগুলো এখানে থাকবে */
        #intro-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #0f0f16 0%, #040406 100%); display: flex; align-items: center; justify-content: center; z-index: 9999999; }
        .tv-osd { display: none; position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.85); color: #fff; padding: 6px 14px; border-radius: 4px; z-index: 99999; border-left: 4px solid #ff0055; }
        .embed-responsive { border: 1px solid #222; border-radius: 8px; background: #000; position: relative; width: 100%; padding-top: 56.25%; }
        .embed-responsive-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .remote-body-floating { display: none; position: fixed; bottom: 20px; right: 15px; background: #0a0a0c; width: 120px; padding: 12px 6px; border-radius: 20px; z-index: 999999; }
    </style>
</head>

<body>

    <div id="intro-loader">
        <div class="loader-content">
            <h1 style="color:white">RS Live TV</h1>
        </div>
    </div>

    <div class="container tv-area">
        <div class="row">
            <div class="col-xs-12 col-md-8 tv-view">
                <div class="embed-responsive">
                    <div id="tvOsd" class="tv-osd"></div>
                    <iframe id="tvPlayer" class="embed-responsive-item" src="channel.html"></iframe>
                </div>
            </div>
            
            <div class="col-xs-12 col-md-4 channel-list">
                <ul id="channel-container">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        // আপনার আগের জাভাস্ক্রিপ্ট কোডগুলো এখানে একইভাবে থাকবে
        window.addEventListener('load', function() {
            setTimeout(function() { document.getElementById('intro-loader').style.display = 'none'; }, 2500);
        });
        // অন্যান্য ফাংশন...
    </script>
</body>
</html>

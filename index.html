<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RS Live TV</title>

<link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
<link href="bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    background:#000;
    margin:0;
    padding:0;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

/* ===== MAIN LAYOUT FIX ===== */

.container.tv-area{
    max-width:100%;
    padding-left:8px;
    padding-right:8px;
    margin-top:10px;
    overflow:visible !important;
}

.row{
    margin-left:0 !important;
    margin-right:0 !important;
}

.tv-view{
    padding-left:4px !important;
    padding-right:4px !important;
    overflow:visible !important;
}

.channel-list{
    padding-left:6px !important;
    padding-right:6px !important;
    overflow:visible !important;
}

/* ===== PLAYER FIX ===== */

.tv-view .embed-responsive{
    border:2px solid #222;
    border-radius:14px;
    background:#000;
    overflow:visible !important;
    box-shadow:0 0 20px rgba(0,0,0,.8);
}

iframe{
    width:100%;
    height:100%;
    border:0 !important;
    display:block;
    border-radius:12px;
    background:#000;
}

/* ===== CHANNEL LIST ===== */

.thumbnail-slider{
    margin:0;
    padding:6px;
    list-style:none;
    overflow-x:hidden;
    overflow-y:auto;
}

.thumbnail-slider li{
    position:relative;
    margin-bottom:10px;
    border-radius:14px;
    overflow:visible !important;
    transition:.2s;
}

/* ===== REMOTE BUTTON ===== */

.remote-btn-container{
    margin-bottom:10px;
}

.remote-open-btn{
    width:100%;
    background:#0f0f0f;
    color:#ddd;
    border:1px solid #222;
    padding:10px;
    border-radius:10px;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.remote-open-btn:hover{
    background:#181818;
    color:#fff;
}

/* ===== SELECTED CHANNEL ===== */

.selected-tv-channel{
    border:2px solid #00eaff !important;
    box-shadow:
        0 0 12px #00eaff,
        0 0 24px rgba(0,234,255,.7) !important;
    background:rgba(0,234,255,.12) !important;
    transform:scale(1.02);
    z-index:20 !important;
}

/* ===== ACTIVE CHANNEL ===== */

.active-tv-channel{
    border:2px solid #ff0055 !important;
    box-shadow:
        0 0 14px #ff0055,
        0 0 30px rgba(255,0,85,.8) !important;
    background:rgba(255,0,85,.14) !important;
    transform:scale(1.02);
    z-index:25 !important;
    animation:glowPulse 1.5s infinite;
}

@keyframes glowPulse{

    0%{
        box-shadow:
            0 0 12px #ff0055,
            0 0 24px rgba(255,0,85,.6);
    }

    50%{
        box-shadow:
            0 0 20px #ff00cc,
            0 0 36px rgba(255,0,204,.9);
    }

    100%{
        box-shadow:
            0 0 12px #ff0055,
            0 0 24px rgba(255,0,85,.6);
    }
}

/* ===== OSD ===== */

.tv-osd{
    display:none;
    position:fixed;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(15,15,15,.95);
    color:#ff0055;
    border:1px solid #333;
    padding:8px 20px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
    z-index:999999;
}

/* ===== REMOTE PANEL ===== */

.remote-body-floating{
    display:none;
    position:fixed;
    right:20px;
    bottom:20px;
    width:105px;
    background:#0c0c0c;
    border:1px solid #222;
    border-radius:25px;
    padding:15px 8px;
    z-index:999999;
    box-shadow:0 0 25px rgba(0,0,0,.9);
}

.remote-header{
    text-align:center;
    color:#666;
    font-size:9px;
    margin-bottom:12px;
    font-weight:bold;
}

.remote-row{
    display:flex;
    gap:6px;
    margin-bottom:8px;
}

.r-btn{
    flex:1;
    height:36px;
    border:none;
    border-radius:10px;
    background:#181818;
    color:#ccc;
    cursor:pointer;
    transition:.2s;
}

.r-btn:active{
    background:#222;
    color:#00d2ff;
}

.r-btn-ok{
    width:48px;
    height:48px;
    border-radius:50%;
    margin:auto;
    display:block;
    background:#101010;
    color:#fff;
    font-weight:bold;
}

/* ===== NOTICE ===== */

.marquee-container{
    background:#111;
    color:#fff;
    padding:8px 0;
    margin-top:10px;
    border-top:1px solid #333;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
}

.notice-label{
    background:#ff0033;
    padding:3px 10px;
    margin-left:10px;
    border-radius:4px;
    font-size:11px;
    font-weight:bold;
}

/* ===== FOOTER ===== */

.footer-premium{
    background:#090909;
    padding:20px 0;
    text-align:center;
}

.copyright{
    color:#555;
    font-size:11px;
    margin-top:15px;
}

/* ===== MOBILE FIX ===== */

@media(max-width:768px){

    .tv-view{
        margin-bottom:12px;
    }

    .channel-list{
        margin-top:10px;
    }

    .selected-tv-channel,
    .active-tv-channel{
        transform:scale(1.01);
    }

}

</style>
</head>

<body>

<div id="tvOsd" class="tv-osd"></div>

<div class="container tv-area">

    <div class="row">

        <!-- PLAYER SIDE -->

        <div class="col-xs-12 col-md-10 tv-view">

            <div class="remote-btn-container">
                <button onclick="toggleRemote(true)" class="remote-open-btn">
                    <i class="fa-solid fa-tv"></i>
                    OPEN TV REMOTE CONTROL PANEL
                </button>
            </div>

            <div class="embed-responsive embed-responsive-16by9">

                <iframe
                    name="player"
                    id="tvPlayer"
                    class="embed-responsive-item"
                    allowfullscreen
                    src="channel.html">
                </iframe>

            </div>

        </div>

        <!-- CHANNEL SIDE -->

        <div class="col-xs-12 col-md-2 channel-list">

            <ul class="thumbnail-slider" id="channel-container">

                <!-- SAMPLE CHANNELS -->

                <li onclick="playChannel('channel1.html',this)">
                    <img src="https://i.postimg.cc/mD1VCt2C/RS-Live.png" width="100%">
                </li>

                <li onclick="playChannel('channel2.html',this)">
                    <img src="https://i.postimg.cc/mD1VCt2C/RS-Live.png" width="100%">
                </li>

                <li onclick="playChannel('channel3.html',this)">
                    <img src="https://i.postimg.cc/mD1VCt2C/RS-Live.png" width="100%">
                </li>

            </ul>

        </div>

    </div>

</div>

<!-- NOTICE -->

<div class="marquee-container">

    <div class="notice-label">NOTICE</div>

    <marquee scrollamount="6">

        ⚠️ বর্তমানে আমাদের ওয়েবসাইট আপডেট চলছে। কিছু চ্যানেল ডাউন থাকতে পারে।

    </marquee>

</div>

<!-- FOOTER -->

<footer class="footer-premium">

    <div class="copyright">
        © 2026 RS LIVE TV | All Rights Reserved
    </div>

</footer>

<!-- REMOTE -->

<div class="remote-body-floating" id="remotePanel">

    <div class="remote-header">RS REMOTE</div>

    <div class="remote-row">

        <button class="r-btn" onclick="moveSelection(-1)">
            <i class="fa-solid fa-chevron-up"></i>
        </button>

    </div>

    <div class="remote-row">

        <button class="r-btn r-btn-ok" onclick="selectAndPlayChannel()">
            OK
        </button>

    </div>

    <div class="remote-row">

        <button class="r-btn" onclick="moveSelection(1)">
            <i class="fa-solid fa-chevron-down"></i>
        </button>

    </div>

</div>

<script>

let selectedChannelIndex = 0;
let activePlayingIndex = -1;

/* ===== PLAY CHANNEL ===== */

function playChannel(url,element){

    document.getElementById('tvPlayer').src = url;

    const channels = document.querySelectorAll('#channel-container li');

    channels.forEach(ch=>{
        ch.classList.remove('active-tv-channel');
        ch.classList.remove('selected-tv-channel');
    });

    element.classList.add('active-tv-channel');

    activePlayingIndex = [...channels].indexOf(element);
    selectedChannelIndex = activePlayingIndex;

    showOSD("📡 LOADING...");
}

/* ===== REMOTE ===== */

function toggleRemote(show){

    document.getElementById('remotePanel').style.display =
        show ? 'block' : 'none';

}

/* ===== MOVE ===== */

function moveSelection(direction){

    const channels =
        document.querySelectorAll('#channel-container li');

    if(!channels.length) return;

    channels.forEach(ch=>{
        ch.classList.remove('selected-tv-channel');
    });

    selectedChannelIndex += direction;

    if(selectedChannelIndex >= channels.length)
        selectedChannelIndex = 0;

    if(selectedChannelIndex < 0)
        selectedChannelIndex = channels.length - 1;

    channels[selectedChannelIndex]
        .classList.add('selected-tv-channel');

    channels[selectedChannelIndex]
        .scrollIntoView({
            behavior:'smooth',
            block:'nearest'
        });
}

/* ===== PLAY SELECTED ===== */

function selectAndPlayChannel(){

    const channels =
        document.querySelectorAll('#channel-container li');

    if(!channels[selectedChannelIndex]) return;

    channels[selectedChannelIndex].click();
}

/* ===== OSD ===== */

function showOSD(text){

    const osd = document.getElementById('tvOsd');

    osd.innerText = text;

    osd.style.display = 'block';

    clearTimeout(window.osdTimeout);

    window.osdTimeout = setTimeout(()=>{
        osd.style.display='none';
    },1200);
}

</script>

</body>
</html>

<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DRBZH98TKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

    <title>RS Live TV</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css?v=12.0" rel="stylesheet">
    
    <style>
        /* 🚫 সিকিউরিটি ও কপি প্রোটেকশন CSS */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: #06060c;
            overflow-x: hidden;
            scroll-behavior: auto !important; 
            overscroll-behavior-y: contain;
        }

        img, iframe, video {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
        }

        iframe {
            background-color: #000;
            border: none;
        }

        /* অ্যান্ড্রয়েড টিভির রিমোট ফোকাস স্টাইল */
        li:focus {
            border: 2px solid #00ffcc !important;
            background-color: #1a1a2e !important;
            transform: scale(1.05);
            outline: none;
        }
        
        .channel-item {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-xs-12">
                <div class="search-box-container" style="padding: 10px 0;">
                    <input type="text" id="channelSearch" placeholder="🔍 চ্যানেল বা লাইভ ম্যাচ খুঁজুন..." autocomplete="off" class="form-control" style="background: #1b1c21; color: #fff; border: 1px solid #2d2e35; border-radius: 4px;">
                </div>
            </div>
        </div>

        <div id="noticeBar" style="color: #fff; padding: 5px; text-align: center; font-size: 14px; background: rgba(255,255,255,0.05); margin-bottom: 10px; border-radius: 4px; display: none;"></div>

        <div class="tv-area">
            <div class="row">
                <div class="col-md-9 col-sm-12 col-xs-12">
                    <div class="embed-responsive embed-responsive-16by9" style="background: #000; border-radius: 8px; overflow: hidden;">
                        <iframe id="tv-iframe" name="player" src="" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" scrolling="no" referrerpolicy="no-referrer"></iframe>
                    </div>
                </div>

                <div class="col-md-3 col-sm-12 col-xs-12">
                    <div class="channel-list" id="channel-list-container">
                        <ul id="channel-container" class="thumbnail-slider"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=12.0"></script>

    <script>
        // রাইট ক্লিক লক
        document.addEventListener('contextmenu', event => event.preventDefault());

        // কিবোর্ড শর্টকাট লক (Inspect Element)
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                e.preventDefault();
                return false;
            }
        });

        // টিভি রিমোটের Arrow Keys দিয়ে চ্যানেল সিলেক্ট করার লজিক
        document.addEventListener('keydown', function(event) {
            const active = document.activeElement;
            const items = Array.from(document.querySelectorAll('#channel-container li')).filter(item => item.style.display !== 'none');
            const currentIndex = items.indexOf(active);

            if (event.keyCode === 40 || event.key === "ArrowDown") { 
                event.preventDefault();
                const nextIndex = (currentIndex + 1) % items.length;
                if (items[nextIndex]) items[nextIndex].focus();
            } else if (event.keyCode === 38 || event.key === "ArrowUp") { 
                event.preventDefault();
                const prevIndex = (currentIndex - 1 + items.length) % items.length;
                if (items[prevIndex]) {
                    items[prevIndex].focus();
                } else if (prevIndex === -1 && document.getElementById('channelSearch')) {
                    document.getElementById('channelSearch').focus(); 
                }
            } else if (event.keyCode === 13 || event.key === "Enter") {
                if (active && active.tagName === 'LI') {
                    event.preventDefault();
                    active.click(); 
                }
            }
        });

        window.addEventListener('focus', function(event) {
            if (document.activeElement && document.activeElement.id === 'channelSearch') {
                event.preventDefault();
                event.stopPropagation();
                return false;
            }
            if (event.target && event.target.tagName === 'LI') {
                event.target.scrollIntoView({ block: 'nearest', behavior: 'auto' });
            }
        }, true); 

        function initTVFocus() {
            setTimeout(() => {
                const firstChannel = document.querySelector('#channel-container li');
                const searchInput = document.getElementById('channelSearch');
                if (firstChannel && document.activeElement !== searchInput) { 
                    firstChannel.focus(); 
                }
            }, 600);
        }
    </script>

    <script async="async" data-cfasync="false" src="https://pl26377079.effectivecpmnetwork.com/cdeccdd75d3e2e6916a42ce9653cfb08/invoke.js"></script>
    <div id="container-cdeccdd75d3e2e6916a42ce9653cfb08"></div>
</body>
</html>

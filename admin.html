<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Live TV - Smart Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#10b981">
</head>
<body class="bg-slate-950 text-white p-4 md:p-8 font-sans relative min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 w-full max-w-sm text-center space-y-4 shadow-2xl">
            <div class="inline-flex p-3 bg-slate-950 rounded-xl border border-slate-800 text-emerald-400 mb-2">🔒</div>
            <div>
                <h2 class="text-lg font-black tracking-wide text-white uppercase">Admin Panel</h2>
                <p class="text-xs text-slate-500 font-medium mt-1">অ্যাডমিন প্যানেলে প্রবেশ করতে পাসওয়ার্ড দিন</p>
            </div>
            <input type="password" id="adminPassword" placeholder="Enter Password..." class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-center text-sm font-bold tracking-widest text-white focus:outline-none focus:border-emerald-500">
            <p id="loginError" class="text-xs text-red-400 font-bold hidden">❌ ভুল পাসওয়ার্ড!</p>
            <button onclick="checkPassword()" class="w-full bg-emerald-500 text-slate-950 font-black p-3 rounded-xl hover:bg-emerald-400 text-sm uppercase tracking-wider transition-all">Login</button>
        </div>
    </div>

    <div id="adminContent" class="max-w-6xl mx-auto space-y-6 filter blur-md pointer-events-none transition-all duration-750">
        
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 py-2 border-b border-slate-900 pb-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-slate-900 rounded-xl border border-slate-800 text-emerald-400 text-xl">⚡</div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent uppercase">RS Live TV Control Panel</h1>
                    <p class="text-[10px] md:text-xs text-slate-500 font-bold tracking-widest uppercase mt-0.5">Dual-Sync Cloud Manager (No Client-Code Change Needed)</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white border border-red-500/20 px-4 py-2 rounded-xl text-xs font-bold transition-all">🔒 Logout</button>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl space-y-4">
            <div class="flex items-center justify-between border-b border-slate-800 pb-3">
                <h3 class="text-sm font-black uppercase text-emerald-400 tracking-wider flex items-center gap-2">📢 Global Settings (নোটিশ, আপডেট ও মেইনটেইন্যান্স)</h3>
                <div class="flex items-center gap-2 bg-slate-950 px-3 py-1.5 rounded-xl border border-slate-800">
                    <span class="text-[11px] font-bold text-slate-400 uppercase">Maintenance Mode:</span>
                    <select id="globalMaintenance" class="bg-transparent text-xs font-black text-emerald-400 focus:outline-none cursor-pointer">
                        <option value="OFF" class="bg-slate-900 text-white">OFF (সচল)</option>
                        <option value="ON" class="bg-slate-900 text-red-400">ON (বন্ধ)</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase">App Scroll Notice (স্ক্রোল নোটিশ)</label>
                    <input type="text" id="globalNotice" class="mt-1.5 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs text-white focus:outline-none focus:border-emerald-500" placeholder="চলমান নোটিশ এখানে লিখুন...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">Telegram Group Link</label>
                    <input type="url" id="globalTelegram" class="mt-1.5 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs text-white focus:outline-none focus:border-emerald-500" placeholder="https://t.me/yourgroup">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">App Version Control</label>
                    <input type="text" id="globalVersion" class="mt-1.5 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs text-white focus:outline-none focus:border-emerald-500" placeholder="E.g., 1.0">
                </div>
                <div class="md:col-span-2 lg:col-span-4">
                    <label class="block text-xs font-bold text-slate-400 uppercase">App / APK Update Link</label>
                    <input type="url" id="globalUpdateLink" class="mt-1.5 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-xs text-white focus:outline-none focus:border-emerald-500" placeholder="https://drive.google.com/.../app.apk">
                </div>
            </div>
            <div class="flex justify-end pt-2">
                <button onclick="saveGlobalSettings()" id="btnSaveGlobal" class="bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-950 font-black px-6 py-2.5 rounded-xl text-xs uppercase tracking-wider hover:opacity-90 transition-all shadow-md">💾 Save Configuration</button>
            </div>
        </div>
        
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex flex-col lg:flex-row gap-4 items-center justify-between shadow-xl">
            <div class="relative w-full lg:w-72">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">🔍</span>
                <input type="text" id="searchBox" oninput="filterChannels()" placeholder="Search channel or category..." class="w-full pl-9 pr-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-emerald-500 text-white placeholder-slate-500">
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto justify-between lg:justify-end">
                <span id="channelCount" class="text-xs font-bold text-slate-400 bg-slate-800 px-3 py-2.5 rounded-xl border border-slate-700">Total: 0</span>
                <button onclick="loadChannels()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-xs font-bold px-3 py-2.5 rounded-xl transition-all">🔄 Refresh</button>
                <button onclick="openFormModal()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 text-xs font-black px-4 py-2.5 rounded-xl transition-all shadow-lg flex items-center gap-1">➕ Add New Channel</button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto max-h-[50vh] pr-1" id="channelList">
            <p class="text-slate-500 text-center py-12 col-span-full font-medium">Please login first...</p>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-md">
            <div class="flex justify-between items-center mb-6">
                <h2 id="formTitle" class="text-xl font-black text-emerald-400">📺 Add New Channel</h2>
                <button onclick="closeFormModal()" class="text-slate-400 hover:text-white bg-slate-800 p-1.5 rounded-lg text-sm">✕</button>
            </div>
            <form id="iptvForm" class="space-y-4">
                <input type="hidden" id="editIndex">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400">Channel Name</label>
                    <input type="text" id="name" required class="mt-1 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500" placeholder="E.g., T Sports HD">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400">Category / ক্যাট</label>
                    <input type="text" id="category" required class="mt-1 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500" placeholder="E.g., Sports">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400">Logo Image URL</label>
                    <input type="url" id="logo" required class="mt-1 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500" placeholder="https://image-link.png">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400">Stream URL (HLS / m3u8)</label>
                    <input type="text" id="streamUrl" required class="mt-1 w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500" placeholder="https://.../index.m3u8">
                </div>
                <div class="flex space-x-2 pt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-slate-950 font-black p-3 rounded-xl hover:bg-emerald-400 text-sm">Save Channel</button>
                    <button type="button" onclick="closeFormModal()" class="w-1/2 bg-slate-800 text-slate-300 font-bold p-3 rounded-xl text-sm border border-slate-700">Cancel</button>
                </div>
            </form>
            <p id="status" class="mt-4 text-center text-sm font-bold min-h-[20px]"></p>
        </div>
    </div>

    <div id="globalStatus" class="fixed bottom-4 right-4 bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-2xl text-xs font-bold hidden z-50"></div>

    <script>
        const ADMIN_PASSWORD = "rubel3137"; 
        const PLAYER_PREFIX = "https://rs-player.netlify.app/jw-player?url=";
        
        let GITHUB_CONFIG = {}; 
        let globalSettings = { notice: "", telegram: "", version: "1.0", updateLink: "", maintenance: "OFF" };
        let channels = [];
        let playlistSha = "";
        let settingsSha = "";

        document.getElementById("adminPassword").addEventListener("keypress", function(e) { if (e.key === "Enter") checkPassword(); });

        function checkPassword() {
            if (document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
                document.getElementById("loginOverlay").classList.add("hidden");
                document.getElementById("adminContent").classList.remove("filter", "blur-md", "pointer-events-none");
                initializeApp();
            } else {
                document.getElementById("loginError").classList.remove("hidden");
            }
        }

        async function initializeApp() {
            try {
                const res = await fetch(`/api/config?t=${Date.now()}`);
                GITHUB_CONFIG = await res.json();
                loadChannels();
                loadGlobalSettings();
            } catch (e) {
                document.getElementById('channelList').innerHTML = "<p class='text-red-400 text-center col-span-full font-bold'>❌ Config Load Error!</p>";
            }
        }

        async function loadChannels() {
            const listDiv = document.getElementById('channelList');
            listDiv.innerHTML = "<p class='text-center text-slate-400 py-12 col-span-full font-medium animate-pulse'>⚡ Syncing Playlist with GitHub...</p>";
            try {
                const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
                if (res.ok) {
                    const data = await res.json();
                    playlistSha = data.sha;
                    const text = decodeURIComponent(atob(data.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    const parsed = JSON.parse(text || "[]");
                    // যদি অবজেক্ট ফরমেটে চলে আসে ভুলে, সেটাকে হ্যান্ডেল করবে
                    channels = Array.isArray(parsed) ? parsed : (parsed.channels || []);
                    renderChannels(channels);
                }
            } catch (err) { listDiv.innerHTML = "<p class='text-center text-red-400 col-span-full'>❌ Playlist loading error!</p>"; }
        }

        async function loadGlobalSettings() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/app_settings.json?t=${Date.now()}`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
                if (res.ok) {
                    const data = await res.json();
                    settingsSha = data.sha;
                    const text = atob(data.content);
                    globalSettings = JSON.parse(text || "{}");
                    
                    document.getElementById('globalNotice').value = globalSettings.notice || "";
                    document.getElementById('globalTelegram').value = globalSettings.telegram || "";
                    document.getElementById('globalVersion').value = globalSettings.version || "1.0";
                    document.getElementById('globalUpdateLink').value = globalSettings.updateLink || "";
                    document.getElementById('globalMaintenance').value = globalSettings.maintenance || "OFF";
                }
            } catch (e) { console.log("No custom settings file found, using defaults."); }
        }

        function renderChannels(list) {
            document.getElementById('channelCount').innerText = `Total: ${list.length}`;
            const listDiv = document.getElementById('channelList');
            if (list.length === 0) { listDiv.innerHTML = "<p class='text-center text-slate-500 py-12 col-span-full font-medium'>No channels found.</p>"; return; }

            listDiv.innerHTML = list.map((ch, index) => {
                const origIdx = channels.indexOf(ch);
                return `
                    <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800 flex flex-col justify-between gap-4">
                        <div class="flex items-center justify-between bg-slate-950 p-2 rounded-xl border border-slate-800 gap-3">
                            <span class="text-xs font-black text-emerald-400 font-mono pl-1">POS: #${origIdx + 1}</span>
                            <div class="flex items-center gap-1.5 w-32">
                                <input type="number" id="posInput-${origIdx}" min="1" max="${channels.length}" value="${origIdx + 1}" class="w-full text-center bg-slate-800 border border-slate-700 rounded-lg py-1 text-xs font-bold text-white focus:outline-none">
                                <button onclick="jumpToPosition(${origIdx})" class="bg-emerald-500 text-slate-950 font-black px-2.5 py-1 rounded-lg text-[10px] uppercase transition-all">Move</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-14 h-14 rounded-xl bg-white border border-slate-800 flex items-center justify-center overflow-hidden shrink-0 p-1">
                                <img src="${ch.image}" class="w-full h-full object-contain" onerror="this.src='https://i.postimg.cc/mD1VCt2C/RS-Live.png';">
                            </div>
                            <div class="truncate flex-1">
                                <div class="flex items-center gap-2">
                                    <h4 class="font-bold text-sm text-white truncate">${ch.name}</h4>
                                    <span class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.5 rounded font-bold">${ch.category || 'General'}</span>
                                </div>
                                <p class="text-[10px] text-slate-400 truncate mt-1 bg-slate-950 p-1.5 rounded-lg font-mono">${(ch.url || "").replace(PLAYER_PREFIX, "")}</p>
                            </div>
                        </div>
                        <div class="flex space-x-2 border-t border-slate-800/60 pt-2.5">
                            <button onclick="startEdit(${origIdx})" class="w-full bg-yellow-500/10 text-yellow-400 hover:bg-yellow-500 hover:text-slate-950 text-xs py-2 rounded-xl font-bold">✏️ Edit</button>
                            <button onclick="deleteChannel(${origIdx})" class="w-full bg-red-600/10 text-red-400 hover:bg-red-600 hover:text-white text-xs py-2 rounded-xl font-bold">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function saveGlobalSettings() {
            const btn = document.getElementById('btnSaveGlobal');
            btn.innerText = "⏳ Saving...";
            
            globalSettings.notice = document.getElementById('globalNotice').value.trim();
            globalSettings.telegram = document.getElementById('globalTelegram').value.trim();
            globalSettings.version = document.getElementById('globalVersion').value.trim();
            globalSettings.updateLink = document.getElementById('globalUpdateLink').value.trim();
            globalSettings.maintenance = document.getElementById('globalMaintenance').value;

            await pushFileToGitHub("app_settings.json", globalSettings, settingsSha, true);
            btn.innerHTML = "💾 Save Configuration";
        }

        async function jumpToPosition(fromIndex) {
            const toPos = parseInt(document.getElementById(`posInput-${fromIndex}`).value) - 1;
            if (isNaN(toPos) || toPos < 0 || toPos >= channels.length || fromIndex === toPos) return;
            const item = channels.splice(fromIndex, 1)[0];
            channels.splice(toPos, 0, item);
            renderChannels(channels);
            await pushFileToGitHub(GITHUB_CONFIG.path, channels, playlistSha, true);
        }

        function filterChannels() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            const filtered = channels.filter(ch => (ch.name || "").toLowerCase().includes(query) || (ch.category || "").toLowerCase().includes(query));
            renderChannels(filtered);
        }

        function openFormModal() { document.getElementById('formModal').classList.remove('hidden'); }
        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); resetForm(); }

        function startEdit(idx) {
            document.getElementById('formTitle').innerText = "✏️ Edit Channel Info";
            document.getElementById('editIndex').value = idx;
            const ch = channels[idx];
            document.getElementById('name').value = ch.name || "";
            document.getElementById('category').value = ch.category || "General";
            document.getElementById('logo').value = ch.image || "";
            document.getElementById('streamUrl').value = (ch.url || "").replace(PLAYER_PREFIX, "");
            document.getElementById('submitBtn').innerText = "Update Channel";
            openFormModal();
        }

        function resetForm() {
            document.getElementById('iptvForm').reset();
            document.getElementById('editIndex').value = "";
            document.getElementById('submitBtn').innerText = "Save Channel";
        }

        document.getElementById('iptvForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.className = "mt-4 text-center text-sm font-bold text-yellow-400 animate-pulse";
            status.innerText = "⏳ Cloud এ ডাটা পাঠানো হচ্ছে...";

            const idx = document.getElementById('editIndex').value;
            let inputUrl = document.getElementById('streamUrl').value.trim();
            if (!inputUrl.startsWith(PLAYER_PREFIX) && !inputUrl.includes("amagi.tv") && !inputUrl.includes("rs-player.netlify.app")) {
                inputUrl = PLAYER_PREFIX + inputUrl;
            }

            const channelObj = { 
                name: document.getElementById('name').value.trim(), 
                category: document.getElementById('category').value.trim(), 
                image: document.getElementById('logo').value.trim(), 
                url: inputUrl 
            };

            if (idx === "") channels.unshift(channelObj);
            else channels[idx] = channelObj;

            await pushFileToGitHub(GITHUB_CONFIG.path, channels, playlistSha, false);
        });

        async function deleteChannel(idx) {
            if (confirm(`আপনি কি নিশ্চিত ডিলিট করতে চান?`)) {
                channels.splice(idx, 1);
                renderChannels(channels);
                await pushFileToGitHub(GITHUB_CONFIG.path, channels, playlistSha, true);
            }
        }

        async function pushFileToGitHub(path, dataObj, currentSha, isBackground) {
            const status = document.getElementById('status');
            const fileUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${path}`;
            let sha = currentSha;

            try {
                const currentRes = await fetch(fileUrl, { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
                if(currentRes.ok) { const cData = await currentRes.json(); sha = cData.sha; }

                const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(dataObj, null, 2))));
                const res = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update ${path}`, content: base64Content, sha: sha })
                });

                if (res.ok) {
                    const resData = await res.json();
                    if(path === GITHUB_CONFIG.path) playlistSha = resData.content.sha;
                    else settingsSha = resData.content.sha;

                    if (!isBackground) {
                        status.className = "mt-4 text-center text-sm font-bold text-emerald-400";
                        status.innerHTML = "✅ সফলভাবে ক্লাউডে লাইভ হয়েছে!";
                        setTimeout(() => { closeFormModal(); renderChannels(channels); }, 1000);
                    } else {
                        showGlobalStatus("✅ সফলভাবে ক্লাউড সেটিংস সেভ হয়েছে!", "text-emerald-400");
                    }
                }
            } catch (err) { showGlobalStatus("❌ ক্লাউড সেভ ত্রুটি!", "text-red-400"); }
        }

        function showGlobalStatus(msg, color) {
            const el = document.getElementById('globalStatus');
            el.className = `fixed bottom-4 right-4 bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-2xl text-xs font-bold z-50 ${color}`;
            el.innerText = msg; el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>

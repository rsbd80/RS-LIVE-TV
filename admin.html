<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন - আরএস লাইভ টিভি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-gray-900/80 backdrop-blur-sm p-8 rounded-2xl shadow-2xl border border-cyan-500/30 w-96">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">আরএস লাইভ টিভি</h2>
            <p class="text-gray-400 mt-1">অ্যাডমিন প্যানেলে স্বাগতম</p>
        </div>
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2">ইমেইল</label>
                <input type="email" id="email" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:border-cyan-400 focus:outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2">পাসওয়ার্ড</label>
                <input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:border-cyan-400 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold py-2 rounded-lg hover:opacity-90 transition">লগইন করুন</button>
            <div id="errorMsg" class="text-red-500 text-center mt-4 text-sm"></div>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'admin-panel.html';
            } catch(err) {
                document.getElementById('errorMsg').innerText = 'ইমেইল বা পাসওয়ার্ড ভুল!';
            }
        });
    </script>
</body>
</html>

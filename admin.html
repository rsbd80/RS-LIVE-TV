<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV JSON Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-4 md:p-8 font-sans">

<!-- লগিন ওভারলে -->
<div id="loginOverlay" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
    <div class="bg-slate-900 p-6 rounded-2xl w-80 text-center space-y-3 border border-slate-700">
        <div class="text-emerald-400 text-3xl">🔐</div>
        <h2 class="text-xl font-bold">Admin Login</h2>
        <input type="password" id="adminPassword" class="w-full p-2 rounded-lg bg-slate-800 border border-slate-600 text-center" placeholder="Password">
        <p id="loginError" class="text-red-400 text-sm hidden">Wrong password</p>
        <button onclick="checkPassword()" class="bg-emerald-500 w-full py-2 rounded-lg font-bold text-slate-950">Enter</button>
    </div>
</div>

<!-- মূল অ্যাডমিন প্যানেল -->
<div id="adminContent" class="max-w-6xl mx-auto space-y-5 filter blur-md pointer-events-none">

    <!-- হেডার -->
    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">⚙️ Admin Panel</h1>
            <p class="text-xs text-slate-500">IPTV JSON Pro Management</p>
        </div>
        <button onclick="toggleGlobalSettings()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm font-bold">🌍 Global Settings</button>
    </div>

    <!-- গ্লোবাল সেটিংস বক্স (প্রাথমিকভাবে hidden) -->
    <div id="globalSettingsBox" class="bg-slate-900 p-5 rounded-2xl border border-slate-700 space-y-4 hidden">
        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
            <h3 class="text-emerald-400 font-bold">📢 Global Configurations</h3>
            <div class="bg-slate-800 px-3 py-1 rounded-lg flex gap-2 items-center">
                <span class="text-xs text-slate-300">Maintenance Mode:</span>
                <select id="globalMaintenance" class="bg-transparent text-emerald-400 text-xs font-bold">
                    <option value="OFF">OFF (সচল)</option>
                    <option value="ON">ON (বন্ধ)</option>
                </select>
            </div>
        </div>
        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">App Scroll Notice (স্ক্রোল নোটিশ)</label>
            <input type="text" id="globalNotice" class="w-full mt-1 p-2 bg-slate-800 rounded-lg border border-slate-700 text-white" placeholder="বাংলা টেক্সট লিখুন...">
        </div>
        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">Telegram Group Link</label>
            <input type="url" id="globalTelegram" class="w-full mt-1 p-2 bg-slate-800 rounded-lg border border-slate-700 text-white">
        </div>
        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">App Version</label>
            <input type="text" id="globalVersion" class="w-full mt-1 p-2 bg-slate-800 rounded-lg border border-slate-700 text-white">
        </div>
        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">APK Update Link</label>
            <input type="url" id="globalUpdateLink" class="w-full mt-1 p-2 bg-slate-800 rounded-lg border border-slate-700 text-white">
        </div>
        <div>
            <label class="text-xs font-bold text-slate-400 uppercase">Adsterra Code</label>
            <textarea id="globalAdCode" rows="2" class="w-full mt-1 p-2 bg-slate-800 rounded-lg border border-slate-700 text-white text-xs"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
            <button onclick="toggleGlobalSettings()" class="bg-slate-700 px-4 py-1.5 rounded-lg text-xs">Close</button>
            <button onclick="saveGlobalSettings()" id="btnSaveGlobal" class="bg-emerald-500 text-slate-950 px-4 py-1.5 rounded-lg text-xs font-bold">💾 Save Settings</button>
        </div>
    </div>

    <!-- চ্যানেল ম্যানেজমেন্ট এলাকা -->
    <div id="mainChannelsArea" class="space-y-4">
        <div class="bg-slate-900 p-3 rounded-xl flex flex-wrap gap-3 justify-between items-center">
            <input type="text" id="searchBox" oninput="filterChannels()" placeholder="🔍 Search channel..." class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-64">
            <div class="flex gap-2">
                <span id="channelCount" class="bg-slate-800 px-3 py-2 rounded-lg text-xs">Total: 0</span>
                <button onclick="loadChannels()" class="bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg text-xs">🔄 Refresh</button>
                <button onclick="openFormModal()" class="bg-emerald-500 text-slate-950 px-4 py-2 rounded-lg text-xs font-bold">➕ Add Channel</button>
            </div>
        </div>

        <!-- চ্যানেল গ্রিড -->
        <div id="channelList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 max-h-[70vh] overflow-y-auto p-1">
            <p class="text-slate-400 text-center col-span-full">Loading channels...</p>
        </div>
    </div>
</div>

<!-- অ্যাড/এডিট মোডাল -->
<div id="formModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-slate-900 rounded-2xl p-5 w-full max-w-md border border-slate-700">
        <h2 id="formTitle" class="text-xl font-bold text-emerald-400 mb-4">📺 Add New Channel</h2>
        <form id="iptvForm" class="space-y-3">
            <input type="hidden" id="editIndex">
            <input type="text" id="name" placeholder="Channel Name" required class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700">
            <input type="url" id="logo" placeholder="Logo URL" class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700">
            <input type="url" id="streamUrl" placeholder="Stream URL" required class="w-full p-2 bg-slate-800 rounded-lg border border-slate-700">
            <div class="flex gap-2 pt-2">
                <button type="submit" class="bg-emerald-500 text-slate-950 font-bold py-2 rounded-lg w-full">Save</button>
                <button type="button" onclick="closeFormModal()" class="bg-slate-700 py-2 rounded-lg w-full">Cancel</button>
            </div>
        </form>
        <p id="status" class="text-center text-sm mt-2"></p>
    </div>
</div>

<!-- টোস্ট নোটিফিকেশন -->
<div id="toastMsg" class="fixed bottom-5 right-5 bg-slate-800 border border-emerald-500 text-white text-sm px-4 py-2 rounded-xl shadow-lg hidden z-50"></div>

<script>
    const ADMIN_PASSWORD = "rubel3137";
    const PLAYER_PREFIX = "https://rs-player.netlify.app/jw-player?url=";

    // GitHub config (আপনার তথ্য দিন)
    let config = {
        owner: "tv-bdxxx",
        repo: "RS-LIVE-TV",
        token: "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",
        path: "playlist.json"
    };

    let channels = [];
    let globalSettings = { notice: "", telegram: "", version: "1.0", updateLink: "", maintenance: "OFF", adCode: "" };
    let playlistSha = "", settingsSha = "";

    // ---------- UTF-8 নিরাপদ base64 ফাংশন (বাংলার জন্য) ----------
    function toBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }
    function fromBase64(base64) {
        return decodeURIComponent(escape(atob(base64)));
    }

    // লগিন চেক
    function checkPassword() {
        if (document.getElementById("adminPassword").value === ADMIN_PASSWORD) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminContent").classList.remove("filter", "blur-md", "pointer-events-none");
            initializeApp();
        } else {
            document.getElementById("loginError").classList.remove("hidden");
        }
    }
    document.getElementById("adminPassword").addEventListener("keypress", e => { if(e.key === "Enter") checkPassword(); });

    function initializeApp() {
        loadChannels();
        loadGlobalSettings();
    }

    function toggleGlobalSettings() {
        const box = document.getElementById("globalSettingsBox");
        const area = document.getElementById("mainChannelsArea");
        if (box.classList.contains("hidden")) {
            box.classList.remove("hidden");
            area.classList.add("hidden");
        } else {
            box.classList.add("hidden");
            area.classList.remove("hidden");
        }
    }

    // চ্যানেল লোড
    async function loadChannels() {
        document.getElementById("channelList").innerHTML = "<p class='col-span-full text-center text-slate-400'>Loading...</p>";
        try {
            const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${config.path}?t=${Date.now()}`;
            const res = await fetch(url, { headers: { "Authorization": `token ${config.token}` } });
            if (res.ok) {
                const data = await res.json();
                playlistSha = data.sha;
                const decoded = fromBase64(data.content);
                channels = JSON.parse(decoded || "[]");
                renderChannels(channels);
            } else throw new Error();
        } catch(e) {
            document.getElementById("channelList").innerHTML = "<p class='col-span-full text-center text-red-400'>Failed to load channels</p>";
        }
    }

    // গ্লোবাল সেটিংস লোড
    async function loadGlobalSettings() {
        try {
            const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/app_settings.json?t=${Date.now()}`;
            const res = await fetch(url, { headers: { "Authorization": `token ${config.token}` } });
            if (res.ok) {
                const data = await res.json();
                settingsSha = data.sha;
                const decoded = fromBase64(data.content);
                globalSettings = JSON.parse(decoded);
            } else {
                // ফাইল না থাকলে ডিফল্ট
                globalSettings = { notice: "", telegram: "", version: "1.0", updateLink: "", maintenance: "OFF", adCode: "" };
            }
        } catch(e) {}
        // UI তে মান বসাও
        document.getElementById("globalNotice").value = globalSettings.notice || "";
        document.getElementById("globalTelegram").value = globalSettings.telegram || "";
        document.getElementById("globalVersion").value = globalSettings.version || "1.0";
        document.getElementById("globalUpdateLink").value = globalSettings.updateLink || "";
        document.getElementById("globalMaintenance").value = globalSettings.maintenance || "OFF";
        document.getElementById("globalAdCode").value = globalSettings.adCode || "";
    }

    // গ্লোবাল সেটিংস সেভ
    async function saveGlobalSettings() {
        const btn = document.getElementById("btnSaveGlobal");
        btn.innerText = "⏳ Saving...";
        globalSettings = {
            notice: document.getElementById("globalNotice").value,
            telegram: document.getElementById("globalTelegram").value,
            version: document.getElementById("globalVersion").value,
            updateLink: document.getElementById("globalUpdateLink").value,
            maintenance: document.getElementById("globalMaintenance").value,
            adCode: document.getElementById("globalAdCode").value
        };
        const success = await pushToGitHub("app_settings.json", globalSettings, settingsSha);
        if (success) {
            settingsSha = success; // new sha
            showToast("✅ Global settings saved");
        } else showToast("❌ Save failed");
        btn.innerText = "💾 Save Settings";
    }

    // জেনেরিক গিটহাব পুশ (sha রিটার্ন করে)
    async function pushToGitHub(path, data, oldSha) {
        const content = toBase64(JSON.stringify(data, null, 2));
        const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
        let sha = oldSha;
        // সর্বশেষ sha নাও
        try {
            const getRes = await fetch(url, { headers: { "Authorization": `token ${config.token}` } });
            if (getRes.ok) {
                const getData = await getRes.json();
                sha = getData.sha;
            }
        } catch(e) {}
        const res = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${config.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: `Update ${path}`, content: content, sha: sha })
        });
        if (res.ok) {
            const newData = await res.json();
            return newData.content.sha;
        } else {
            console.error(await res.text());
            return null;
        }
    }

    // চ্যানেল রেন্ডার (পজিশন ইনপুট + সেট বাটন সহ)
    function renderChannels(channelsToRender) {
        const container = document.getElementById("channelList");
        const total = channelsToRender.length;
        document.getElementById("channelCount").innerText = `Total: ${total}`;
        if (total === 0) {
            container.innerHTML = "<p class='col-span-full text-center text-slate-500'>No channels</p>";
            return;
        }
        container.innerHTML = channelsToRender.map((ch, idx) => {
            // আসল ইনডেক্স খুঁজে বের করো (মূল অ্যারে থেকে)
            const realIndex = channels.findIndex(c => c === ch);
            const name = ch.name || "Unnamed";
            const logo = ch.image || "";
            const streamShort = (ch.url || "").replace(PLAYER_PREFIX, "").substring(0, 40);
            return `
                <div class="bg-slate-900 rounded-xl p-3 border border-slate-700 flex flex-col gap-2">
                    <div class="flex items-center gap-2">
                        <div class="bg-slate-800 rounded-lg p-1 w-12 h-12 flex items-center justify-center">
                            <img src="${logo}" class="max-w-full max-h-full object-contain" onerror="this.src='https://placehold.co/64x64/1e293b/ffffff?text=No+Logo'">
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-bold text-sm truncate">${escapeHtml(name)}</div>
                            <div class="text-[10px] text-slate-400 truncate">${streamShort}</div>
                        </div>
                    </div>
                    <!-- পজিশন কন্ট্রোল -->
                    <div class="flex items-center justify-between gap-2 mt-1 bg-slate-800/50 p-2 rounded-lg">
                        <span class="text-[10px] text-slate-400">Position #</span>
                        <input type="number" id="posInput-${realIndex}" min="1" max="${channels.length}" value="${realIndex+1}" class="w-16 text-center bg-slate-700 rounded border border-slate-600 text-white text-sm p-1">
                        <button onclick="jumpToPosition(${realIndex})" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-2 py-1 rounded">Set</button>
                    </div>
                    <div class="flex gap-2 mt-1">
                        <button onclick="startEdit(${realIndex})" class="bg-yellow-600/40 text-yellow-200 text-xs py-1 rounded w-full">✏️ Edit</button>
                        <button onclick="deleteChannel(${realIndex})" class="bg-red-600/40 text-red-200 text-xs py-1 rounded w-full">🗑️ Delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // পজিশন পরিবর্তন
    async function jumpToPosition(fromIndex) {
        const inputVal = document.getElementById(`posInput-${fromIndex}`).value;
        let toPos = parseInt(inputVal) - 1;
        if (isNaN(toPos)) return;
        if (toPos < 0) toPos = 0;
        if (toPos >= channels.length) toPos = channels.length - 1;
        if (fromIndex === toPos) return;
        const channel = channels.splice(fromIndex, 1)[0];
        channels.splice(toPos, 0, channel);
        renderChannels(channels);
        showToast("⏳ Updating position on GitHub...");
        const newSha = await pushToGitHub(config.path, channels, playlistSha);
        if (newSha) {
            playlistSha = newSha;
            showToast("✅ Position updated");
        } else showToast("❌ Update failed");
    }

    async function deleteChannel(index) {
        if (confirm("Delete this channel permanently?")) {
            channels.splice(index, 1);
            const newSha = await pushToGitHub(config.path, channels, playlistSha);
            if (newSha) {
                playlistSha = newSha;
                renderChannels(channels);
                showToast("✅ Channel deleted");
            } else showToast("❌ Delete failed");
        }
    }

    function filterChannels() {
        const keyword = document.getElementById("searchBox").value.toLowerCase();
        const filtered = channels.filter(ch => (ch.name || "").toLowerCase().includes(keyword));
        renderChannels(filtered);
    }

    function openFormModal() {
        document.getElementById("formModal").style.display = "flex";
        resetForm();
    }
    function closeFormModal() {
        document.getElementById("formModal").style.display = "none";
        document.getElementById("status").innerText = "";
    }
    function resetForm() {
        document.getElementById("iptvForm").reset();
        document.getElementById("editIndex").value = "";
        document.getElementById("formTitle").innerHTML = "📺 Add New Channel";
    }
    function startEdit(index) {
        const ch = channels[index];
        document.getElementById("editIndex").value = index;
        document.getElementById("name").value = ch.name || "";
        document.getElementById("logo").value = ch.image || "";
        let cleanUrl = (ch.url || "").replace(PLAYER_PREFIX, "");
        document.getElementById("streamUrl").value = cleanUrl;
        document.getElementById("formTitle").innerHTML = "✏️ Edit Channel";
        openFormModal();
    }

    document.getElementById("iptvForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const idx = document.getElementById("editIndex").value;
        let stream = document.getElementById("streamUrl").value.trim();
        if (stream && !stream.startsWith(PLAYER_PREFIX)) stream = PLAYER_PREFIX + stream;
        const newChannel = {
            name: document.getElementById("name").value.trim(),
            image: document.getElementById("logo").value.trim(),
            url: stream
        };
        if (idx === "") channels.unshift(newChannel);
        else channels[idx] = newChannel;

        document.getElementById("status").innerText = "⏳ Saving...";
        const newSha = await pushToGitHub(config.path, channels, playlistSha);
        if (newSha) {
            playlistSha = newSha;
            document.getElementById("status").innerHTML = "✅ Saved!";
            setTimeout(() => {
                closeFormModal();
                renderChannels(channels);
            }, 800);
        } else {
            document.getElementById("status").innerHTML = "❌ Error saving";
        }
    });

    function showToast(msg) {
        const toast = document.getElementById("toastMsg");
        toast.innerText = msg;
        toast.classList.remove("hidden");
        setTimeout(() => toast.classList.add("hidden"), 2500);
    }

    // এন্টার চাপলে মোডাল সাবমিট না হয় সেটা ঠিক আছে
</script>
</body>
    </html>

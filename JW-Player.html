<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV - RS Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- JW Player Library -->
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";</script>

    <style>
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        #myElement {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* আপনার দ্বিতীয় কোডের কাস্টম ফিউচার: প্লে বাটন ডিজাইন */
        .jw-state-paused .jw-svg-icon-play {
            background-image: url(https://cdn.jsdelivr.net/gh/Hadi0609/JioTvAssets@v1.0/assets/jwp/play.svg);
            background-size: contain;
            background-repeat: no-repeat;
        }
        .jw-state-paused .jw-svg-icon-play path { display: none; }

        /* ভিডিও স্ট্রেচিং ফিক্স */
        .jw-video.jw-reset { object-fit: fill !important; }
    </style>
</head>
<body>

    <div id="myElement"></div>

    <script type="text/javascript">
        // ১. ইউআরএল থেকে চ্যানেল লিঙ্ক ধরার লজিক
        const urlParams = new URLSearchParams(window.location.search);
        const streamSource = urlParams.get('url');

        if (streamSource) {
            // ২. প্লেয়ার সেটআপ
            jwplayer("myElement").setup({
                playlist: [{
                    file: streamSource, // ডাইনামিকলি আসা লিঙ্ক
                    type: "hls"
                }],
                autostart: true,
                stretching: "exactfit",
                width: "100%",
                height: "100%",
                primary: "html5",
                displaytitle: false
            });

            // ৩. সাউন্ড এবং এরর হ্যান্ডলিং (আপনার ফাস্ট কোড থেকে নেওয়া ফিউচার)
            const player = jwplayer("myElement");

            player.on("ready", () => {
                player.setMute(false);
                player.setVolume(100);
            });

            player.on("error", () => {
                // এরর হলে মেসেজ দেখাবে
                document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:20%; font-family:sans-serif;">Stream Offline / Error!</div>';
            });
        } else {
            // লিঙ্ক না থাকলে মেসেজ
            document.body.innerHTML = '<div style="color:white; text-align:center; margin-top:20%; font-family:sans-serif;">No Stream Found</div>';
        }
    </script>
</body>
</html>

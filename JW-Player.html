<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>RS Player - Zoom to Fill</title>

    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>
        jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
    </script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { 
            width:100%; height:100%; 
            background:#000; overflow:hidden; 
            position: fixed; /* মোবাইল রোটেশন ও ফুল স্ক্রিন ফিক্স */
        }
        #player { width:100% !important; height:100% !important; position: absolute; top:0; left:0; }
        
        /* লোডার স্টাইল */
        #loader {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#000; display:flex; justify-content:center; align-items:center;
            z-index:9999; flex-direction:column;
        }
        .spinner {
            width:50px; height:50px; border:4px solid rgba(255,255,255,.1);
            border-top:4px solid #00c3ff; border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        #loader p { margin-top:15px; color:#fff; font-family: sans-serif; font-size:14px; }

        /* ফুল স্ক্রিনে জুম ইফেক্ট বর্ডারহীন রাখার সিএসএস ফিক্স */
        .jw-video.jw-reset {
            object-fit: fill !important; /* স্ক্রিনের রেশিও অনুযায়ী পুরো জায়গা পূর্ণ করবে */
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="status-text">Loading Stream...</p>
</div>

<div id="player"></div>

<script>
    function getStreamUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('url');
    }

    const streamSource = getStreamUrl();

    if (streamSource) {
        // স্পোর্টস চ্যানেলগুলোর Error Code: 232011 (CORS) ফিক্স করার ট্রিক
        let finalStreamUrl = "";
        if (streamSource.includes("gpcdn.net") || streamSource.includes("corsproxy")) {
            finalStreamUrl = streamSource;
        } else {
            finalStreamUrl = "https://corsproxy.io/?" + encodeURIComponent(streamSource);
        }

        const player = jwplayer("player");

        player.setup({
            playlist: [{
                file: finalStreamUrl,
                type: "hls"
            }],
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            stretching: "fill", // ভিডিও জুম করে বর্ডার কেটে স্ক্রিনে ফিট করবে
            controls: true,
            displaytitle: false
        });

        // প্লেয়ার রেডি হলে লোডার হাইড ও সাউন্ড আনমিউট
        player.on("ready", function() {
            document.getElementById("loader").style.display = "none";
            player.setMute(false);
            player.setVolume(100);
        });

        // ভিডিও চালু হলে বাফার লোডার সরানো এবং সাউন্ড নিশ্চিত করা
        player.on("play", function() {
            document.getElementById("loader").style.display = "none";
            player.setMute(false);
            player.setVolume(100);
        });

        // ভিডিও বাফারিং বা লোড হওয়ার সময় স্পিনার আবার দেখানোর জন্য
        player.on("buffer", function() {
            document.getElementById("status-text").innerText = "Buffering...";
            document.getElementById("loader").style.display = "flex";
        });

        // ফুল স্ক্রিন মোডেও ভলিউম ঠিক রাখার লজিক
        player.on("fullscreen", function() {
            player.setVolume(100);
        });

        // এরর হ্যান্ডলিং
        player.on("error", function() {
            document.getElementById("loader").style.display = "flex";
            document.getElementById("status-text").innerText = "Stream Offline / Failed!";
        });

    } else {
        document.getElementById("loader").style.display = "flex";
        document.getElementById("status-text").innerText = "No URL Provided!";
    }
</script>

</body>
</html>

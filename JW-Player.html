<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";</script>

    <style>
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        #myElement {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ফুল স্ক্রিন ফিক্স */
        .jw-video.jw-reset { object-fit: fill !important; }
        
        /* আপনার কাস্টম প্লে বাটন ডিজাইন */
        .jw-state-paused .jw-svg-icon-play {
            background-image: url(https://cdn.jsdelivr.net/gh/Hadi0609/JioTvAssets@v1.0/assets/jwp/play.svg);
            background-size: contain;
            background-repeat: no-repeat;
        }
        .jw-state-paused .jw-svg-icon-play path { display: none; }
    </style>
</head>
<body>

    <div id="myElement"></div>

    <script type="text/javascript">
        // এটি এখন বাইরের লিঙ্ক রিসিভ করার ক্ষমতা রাখবে
        const urlParams = new URLSearchParams(window.location.search);
        const channelUrl = urlParams.get('url');

        jwplayer("myElement").setup({
            file: channelUrl || "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8",
            type: "hls",
            autostart: true,
            stretching: "fill", 
            width: "100%",
            height: "100%",
            primary: "html5"
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV</title>
    <!-- মোবাইল ও ফুলস্ক্রিন ওরিয়েন্টেশনের জন্য ভিউপোর্ট আপডেট করা হয়েছে -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";</script>

    <style>
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        #myElement {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ভিডিওর দুই সাইড কাটা ফিক্স করার জন্য */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        /* কাস্টম আইকন স্টাইল (আপনার দেওয়া) */
        .jw-state-paused .jw-svg-icon-play {
            background-image: url(https://cdn.jsdelivr.net/gh/Hadi0609/JioTvAssets@v1.0/assets/jwp/play.svg);
            background-size: contain;
            background-repeat: no-repeat;
        }
        .jw-state-paused .jw-svg-icon-play path { display: none; }
    </style>
</head>
<body>

    <div id="myElement"></div>

    <script type="text/javascript">
        // ১. ব্রাউজারের ইউআরএল থেকে '?url=' অংশের লিঙ্কটি বের করা
        const urlParams = new URLSearchParams(window.location.search);
        const streamSource = urlParams.get('url');

        // ২. যদি লিঙ্ক খুঁজে পাওয়া যায়, তবেই প্লেয়ার লোড হবে
        if (streamSource) {
            jwplayer("myElement").setup({
                playlist: [{
                    file: streamSource, // এখানে লাইভ টোকেনসহ লিঙ্কটি ডাইনামিকভাবে বসে যাবে
                    type: "hls"
                }],
                autostart: true,
                stretching: "exactfit", // স্ক্রিন ছোট-বড় বা ওরিয়েন্টেশন ফিক্স করার জন্য
                width: "100%",
                height: "100%",
                primary: "html5",
                displaytitle: false
            });

            // প্লেয়ার রেডি হলে সাউন্ড ১০০% করার জন্য
            jwplayer().on("ready", () => {
                jwplayer().setMute(false);
                jwplayer().setVolume(100);
            });
        } else {
            // যদি কোনো লিঙ্ক না পাওয়া যায় তবে স্ক্রিনে মেসেজ দেখাবে
            document.body.innerHTML = '<div style="color:white; text-align:center; margin-top:20%;">No Stream URL Provided!</div>';
        }
    </script>
</body>
</html>

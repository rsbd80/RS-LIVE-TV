<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";</script>

    <style>
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* ফুল স্ক্রিন ফিক্স */
        }
        #myElement {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ফুল স্ক্রিন করলে পুরো স্ক্রিন জুড়ে ভিডিও দেখানোর ফিক্স */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
            width: 100% !important;
            height: 100% !important;
        }
        /* Custom Icon Styles (Optional) */
        .jw-state-paused .jw-svg-icon-play {
            background-image: url(https://cdn.jsdelivr.net/gh/Hadi0609/JioTvAssets@v1.0/assets/jwp/play.svg);
            background-size: contain;
            background-repeat: no-repeat;
        }
        .jw-state-paused .jw-svg-icon-play path { display: none; }
    </style>
</head>
<body>

    <div id="myElement"></div>

    <script type="text/javascript">
        // ১. index.html থেকে আসা আনলিমিটেড চ্যানেলের লিঙ্ক ধরার লজিক
        const urlParams = new URLSearchParams(window.location.search);
        const incomingUrl = urlParams.get('url');

        let finalStreamUrl = "";

        if (incomingUrl) {
            // গিটহাবের স্পোর্টস চ্যানেলগুলোর 'Error 232011' বা ব্লকিং সমস্যা দূর করার জন্য CORS Proxy ব্যবহার
            finalStreamUrl = "https://corsproxy.io/?" + encodeURIComponent(incomingUrl);
        } else {
            // যদি কোনো চ্যানেল সিলেক্ট করা না থাকে, তবে আপনার দেওয়া ডিফল্ট লিঙ্কটি চলবে
            finalStreamUrl = "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8";
        }

        // ২. JW Player সেটআপ
        jwplayer("myElement").setup({
            file: finalStreamUrl,
            type: "hls",
            autostart: true,
            stretching: "fill", // ফুল স্ক্রিন পুরো জায়গা জুড়ে দেখার জন্য 'fill'
            width: "100%",
            height: "100%",
            primary: "html5"
        });

        // ৩. চ্যানেল ওপেন হওয়ার সাথে সাথে সাউন্ড জোরে (Unmute) আসার সমাধান
        jwplayer().on("ready", () => {
            jwplayer().setMute(false);
            jwplayer().setVolume(100);
        });

        // ফুল স্ক্রিন করলেও যেন ভলিউম কম না হয়
        jwplayer().on("fullscreen", () => {
            jwplayer().setVolume(100);
        });
    </script>
</body>
</html>

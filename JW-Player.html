<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV</title>
    <!-- ফুল স্ক্রিনে ভিডিও রেশিও ঠিক রাখার জন্য ভিউপোর্ট আপডেট করা হয়েছে -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <script>jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";</script>

    <style>
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* ফুল স্ক্রিন ফিক্স */
        }
        #myElement {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ফুল স্ক্রিন করলে যেন ভিডিওর দুই সাইড কেটে না যায় বা বর্ডার না থাকে */
        .jw-video.jw-reset { 
            object-fit: fill !important; 
        }
        /* আপনার কাস্টম প্লে বাটন ডিজাইন */
        .jw-state-paused .jw-svg-icon-play {
            background-image: url(https://cdn.jsdelivr.net/gh/Hadi0609/JioTvAssets@v1.0/assets/jwp/play.svg);
            background-size: contain;
            background-repeat: no-repeat;
        }
        .jw-state-paused .jw-svg-icon-play path { display: none; }
    </style>
</head>
<body>

    <div id="myElement"></div>

    <script type="text/javascript">
        // ১. URL থেকে ডাইনামিক লিঙ্ক ধরার লজিক (যা script.js থেকে পাঠানো হচ্ছে)
        const urlParams = new URLSearchParams(window.location.search);
        let streamSource = urlParams.get('url');

        // যদি বাইরে থেকে কোনো লিঙ্ক না আসে, তবে আপনার ডিফল্ট লিঙ্কটি চলবে
        if (!streamSource) {
            streamSource = "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8";
        }

        // ২. ডাইনামিক লিঙ্ক দিয়ে প্লেয়ার সেটআপ
        jwplayer("myElement").setup({
            playlist: [{
                file: streamSource, // এখানে গিটহাবের টোকেনসহ লাইভ লিঙ্কটি বসে যাবে
                type: "hls"
            }],
            autostart: true,
            stretching: "fill", // ফুল স্ক্রিন পুরো জায়গা জুড়ে চলার জন্য
            width: "100%",
            height: "100%",
            primary: "html5",
            displaytitle: false
        });

        // ৩. প্লেয়ার রেডি হলে সাউন্ড অটো-ফিক্স
        jwplayer().on("ready", () => {
            jwplayer().setMute(false);
            jwplayer().setVolume(100);
        });
    </script>
</body>
</html>

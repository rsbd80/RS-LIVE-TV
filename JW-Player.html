<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RUBEL LIVETV - Clappr Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }
        /* প্লেয়ার কন্টেইনারকে ফুল স্ক্রিন করা */
        #player {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }
        /* ক্লাপার প্লেয়ারের ভেতরের ভিডিও এলিমেন্টকে পুরো স্ক্রিন জুড়ে স্ট্রেচ করা */
        [data-player] video {
            object-fit: fill !important;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="player"></div>

    <script type="text/javascript">
        // ১. URL থেকে আনলিমিটেড চ্যানেলের লিঙ্ক (?url=...) ধরার লজিক
        const urlParams = new URLSearchParams(window.location.search);
        const incomingUrl = urlParams.get('url');

        let finalStreamUrl = "";

        if (incomingUrl) {
            // গিটহাবের স্পোর্টস চ্যানেলগুলোর CORS বা ব্লকিং সমস্যা দূর করতে প্রক্সি ব্যবহার
            finalStreamUrl = "https://corsproxy.io/?" + encodeURIComponent(incomingUrl);
        } else {
            // যদি কোনো লিঙ্ক না পাঠানো হয়, তবে আপনার ডিফল্ট লিঙ্কটি চলবে
            finalStreamUrl = "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8";
        }

        // ২. Clappr Player সেটআপ
        const player = new Clappr.Player({
            source: finalStreamUrl,
            parentId: "#player",
            baseUrl: 'https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist',
            autoPlay: true,       // স্বয়ংক্রিয়ভাবে প্লে হবে
            mute: false,          // মিউট থাকবে না, সাউন্ড আসবে
            width: '100%',
            height: '100%',
            chromecast: true,     // কাস্ট করার অপশন (যদি প্রয়োজন হয়)
            events: {
                onReady: function() {
                    // প্লেয়ার রেডি হলে সাউন্ড ফুল (১০০%) করার চেষ্টা
                    this.setVolume(100);
                },
                onPlay: function() {
                    this.setVolume(100);
                }
            }
        });
    </script>
</body>
</html>

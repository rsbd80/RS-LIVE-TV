<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS LIVE TV</title>     
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>

  <style>      
    * { margin: 0; padding: 0; box-sizing: border-box; }      
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }      
    #player { width: 100%; height: 100vh; }
    /* প্লেয়ারের ভেতরের ভিডিও যাতে পুরো স্ক্রিন জুড়ে থাকে */
    .clappr-video { width: 100% !important; height: 100% !important; }
  </style>  
</head>
<body>    

  <div id="player"></div>
       
  <script>
    // এখানে আপনার সচল .m3u8 অথবা .mpd লিংকটি বসাবেন
    // টেস্ট করার জন্য নিচে একটি ফ্রি সচল লাইভ স্ট্রিম লিংক দেওয়া হলো
    const streamLink = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd"; 

    var player = new Clappr.Player({
      source: streamLink,
      parentId: "#player",
      plugins: [DashShakaPlayback],
      shakaConfiguration: {
        drm: {
          // যদি DRM সুরক্ষিত চ্যানেল হয়, তবে এখানে Key বসাতে পারবেন
          clearKeys: {
            '549ab7cd35a64bb6bb479ecead04d69d': '829799ed534d11fcadeb4b192467e050'
          }
        }
      },
      width: '100%',
      height: '100%',
      autoPlay: true,    // অ্যাপ ওপেন হলেই অটোমেটিক প্লে হবে
      mute: false,       // সাউন্ড চালু থাকবে
      preload: 'metadata',
      mediacontrol: { seekbar: '#e74c3c', buttons: '#fff' } // আপনার থিমের সাথে ম্যাচিং কন্ট্রোল কালার
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS LIVE TV</title>     
  
  <!-- Plyr CSS & JS (ভিডিও প্লেয়ার লোড করার জন্য) -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  
  <!-- Shaka Player Core (DRM এবং .mpd ফাইল প্লে করার জন্য) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.1/shaka-player.compiled.js"></script>

  <style>      
    * { margin: 0; padding: 0; box-sizing: border-box; }      
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }      
    .player-wrapper { width: 100%; height: 100vh; }
    video { width: 100%; height: 100%; object-fit: contain; }
  </style>  
</head>
<body>    

  <div class="player-wrapper">
    <!-- এখানে লোডিং টেক্সট রাখা হয়েছে, ভিডিও কানেক্ট হলেই এটি চলে যাবে -->
    <video id="player" controls playsinline autoplay muted poster="Loading Channel..."></video>
  </div>
       
  <script>      
    document.addEventListener('DOMContentLoaded', async () => {        
      shaka.polyfill.installAll();        
      if (!shaka.Player.isBrowserSupported()) return;          

      const video = document.getElementById('player');
      const player = new shaka.Player(video);        

      // Plyr কন্ট্রোলস সেটআপ
      const controls = new Plyr(video, {
        controls: ['play-large', 'play', 'mute', 'volume', 'fullscreen'],
        autoplay: true
      });

      // আপনার দেওয়া DRM ক্লিয়ার-কী কনফিগারেশন
      player.configure({         
        drm: { 
          clearKeys: { 
            "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" 
          } 
        }
      });          
      
      // আপনার দেওয়া .mpd চ্যানেল লিংক
      const streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";

      try {          
          await player.load(streamUrl);
          
          // অটো-প্লে সচল করতে ১ সেকেন্ড পর সাউন্ড আনমিউট হবে
          setTimeout(() => {
              video.muted = false;
              video.volume = 1.0;
          }, 1000);
      } catch (error) { 
          console.error("Error loading channel: ", error);
      }      
    });    
  </script>
</body>
</html>

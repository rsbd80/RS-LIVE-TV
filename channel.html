<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RS LIVE TV - Web Fix</title>     
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>    
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.1/controls.min.css" crossorigin="anonymous">
  
  <style>      
    * { margin: 0; padding: 0; box-sizing: border-box; }      
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }      
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }      
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }      
    .shaka-spinner-container { display: flex !important; }
  </style>  
</head>
<body>    

  <div class="shaka-video-container" id="video-container" data-shaka-player-container="" shaka-controls="true">      
    <video autoplay playsinline id="video" class="shaka-video" muted></video>  
  </div>
       
  <script>      
    document.addEventListener('DOMContentLoaded', async () => {        
      shaka.polyfill.installAll();        
      if (!shaka.Player.isBrowserSupported()) return;          

      const video = document.getElementById('video');
      const container = document.getElementById('video-container');      
      const player = new shaka.Player(video);        
      
      const ui = new shaka.ui.Overlay(player, container, video);        
      ui.configure({          
        controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
      });  

      player.configure({         
        drm: { 
          clearKeys: { 
            "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" 
          } 
        }
      });          
      
      // ডোমেন ব্লকিং বা CORS এরর এড়াতে পাবলিক প্রক্সি ব্যবহার করা হয়েছে
      const originalLink = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";
      const proxyLink = "https://cors-anywhere.herokuapp.com/" + originalLink;

      try {          
          // প্রথমে প্রক্সি লিংক দিয়ে ট্রাই করবে, ব্লক হলে ডিরেক্ট লিংক ট্রাই করবে
          await player.load(proxyLink);
          console.log('Proxy Load Success!');
      } catch (error) { 
          console.log('Proxy failed, trying direct link...');
          try {
              await player.load(originalLink);
          } catch (e) {
              console.error('সব উপায়েই ব্লক দেখাচ্ছে। এরর:', e);
          }
      }      

      // অটো-প্লে এবং আনমিউট পলিসি
      setTimeout(() => {
          video.muted = false;
          video.volume = 1.0;
      }, 1500);
    });    
  </script>
</body>
</html>
